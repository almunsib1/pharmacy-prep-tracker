<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إدارة مستخدمي وصفات البريد</title>
  <link rel="stylesheet" href="style.css">
  <script src="users.js" defer></script>
</head>
<body>
  <main class="app-shell employee-shell">
    <header class="official-top">
      <div class="official-header">
        <h2>تجمع المدينة المنورة الصحي</h2>
        <h3>مستشفى الملك فهد بالمدينة المنورة</h3>
        <h3>إدارة الرعاية الصيدلانية</h3>
      </div>
      <img class="official-logo" src="logo.png" alt="Logo">
    </header>

    <hr class="official-divider">

    <div class="employee-meta">
      <div class="date-box" id="dateBox"></div>
    </div>

    <h1 class="employee-page-title">إدارة مستخدمي وصفات البريد</h1>

    <section id="adminLoginView" class="view auth-view">
      <form id="adminLoginForm" class="panel employee-login-card">
        <label for="adminUsername">اسم المستخدم</label>
        <input id="adminUsername" autocomplete="username" required>

        <label for="adminPin">PIN</label>
        <input id="adminPin" type="password" inputmode="numeric" autocomplete="current-password" required>

        <button class="primary-btn icon-action" type="submit" title="دخول" aria-label="دخول">↵</button>
        <p id="adminLoginMessage" class="message" role="status"></p>
      </form>
    </section>

    <section id="usersView" class="users-page hidden">
      <header class="topbar employee-toolbar upload-toolbar">
        <div class="user-chip">
          <strong>Admin</strong>
          <button id="adminLogoutBtn" class="logout-icon" type="button" title="خروج" aria-label="خروج">↪</button>
        </div>
      </header>

      <form id="userForm" class="users-form">
        <label for="nameInput">اسم الموظف</label>
        <input id="nameInput" autocomplete="name" required>

        <label for="usernameInput">اسم المستخدم</label>
        <input id="usernameInput" autocomplete="username" required>

        <label for="pinInput">PIN</label>
        <input id="pinInput" type="password" inputmode="numeric" autocomplete="new-password" required>

        <label class="active-user-row">
          <input id="activeInput" type="checkbox" checked>
          <span>نشط</span>
        </label>

        <div class="user-form-actions">
          <button id="saveUserBtn" class="primary-btn icon-action" type="submit" title="إضافة مستخدم" aria-label="إضافة مستخدم">＋</button>
          <button id="cancelEditBtn" class="ghost-btn icon-action hidden" type="button" title="إلغاء التعديل" aria-label="إلغاء التعديل">×</button>
        </div>
      </form>

      <div class="table-wrap users-table-wrap">
        <table class="daily-table users-table">
          <thead>
            <tr>
              <th>اسم الموظف</th>
              <th>اسم المستخدم</th>
              <th>الحالة</th>
              <th>تعديل</th>
              <th>حذف</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>

      <p id="usersMessage" class="message" role="status"></p>
    </section>
  </main>
</body>
</html>
