<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>لوحة مشرف تحضير الوصفات</title>
  <link rel="stylesheet" href="style.css?v=20260612-portal">
  <script src="dashboard.js" defer></script>
</head>
<body>
  <main class="app-shell employee-shell dashboard-shell">
    <header class="official-top">
      <div class="official-header">
        <h2>تجمع المدينة المنورة الصحي</h2>
        <h3>مستشفى الملك فهد بالمدينة المنورة</h3>
        <h3>إدارة الرعاية الصيدلانية</h3>
      </div>
      <img class="official-logo" src="logo.png" alt="Logo">
    </header>

    <hr class="official-divider">

    <div class="employee-meta dashboard-meta">
      <div class="dashboard-date-stack">
        <div class="date-box" id="dateBox"></div>
        <div class="update-box" id="reportDate"></div>
      </div>
    </div>

    <h1 class="employee-page-title">مؤشر وصفات البريد اليومي</h1>

    <section id="dashboardLoginView" class="view auth-view">
      <form id="dashboardLoginForm" class="panel employee-login-card">
        <label for="adminUsername">اسم المستخدم</label>
        <input id="adminUsername" autocomplete="username" required>

        <label for="adminPin">PIN</label>
        <input id="adminPin" type="password" inputmode="numeric" autocomplete="current-password" required>

        <button class="primary-btn icon-action" type="submit" title="دخول" aria-label="دخول">↵</button>
        <p id="dashboardLoginMessage" class="message" role="status"></p>
      </form>
    </section>

    <section id="supervisorPanel" class="view supervisor-panel hidden">
      <header class="topbar employee-toolbar upload-toolbar">
        <div class="user-chip">
          <strong>Admin</strong>
          <button id="dashboardLogoutBtn" class="logout-icon" type="button" title="خروج" aria-label="خروج">↪</button>
        </div>
      </header>

      <header class="supervisor-head">
        <div class="supervisor-actions">
          <button id="refreshSupervisorBtn" class="dashboard-icon-btn" type="button" title="تحديث" aria-label="تحديث">↻</button>
          <button id="printReportBtn" class="dashboard-icon-btn" type="button" title="طباعة التقرير" aria-label="طباعة التقرير">🖨</button>
        </div>
      </header>

      <div class="summary-grid">
        <div class="summary-card">
          <span>إجمالي القائمة</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="summary-card done">
          <span>جاهزة للإرسال</span>
          <strong id="preparedCount">0</strong>
        </div>
        <div class="summary-card pending">
          <span>تحت المعالجة</span>
          <strong id="pendingCount">0</strong>
        </div>
      </div>

      <div class="status-filter" role="group" aria-label="فلترة حالة الوصفات">
        <button class="filter-btn active-filter" type="button" data-filter="all">الكل</button>
        <button class="filter-btn" type="button" data-filter="prepared">جاهزة للإرسال</button>
        <button class="filter-btn" type="button" data-filter="pending">تحت المعالجة</button>
      </div>

      <div class="dashboard-search">
        <input id="fileSearchInput" type="search" inputmode="numeric" placeholder="MRN">
        <button id="fileSearchBtn" class="dashboard-search-btn" type="button" title="بحث" aria-label="بحث">⌕</button>
      </div>

      <div class="table-wrap">
        <table class="daily-table">
          <thead>
            <tr>
              <th>رقم الملف</th>
              <th>اسم المريض</th>
              <th>الحالة</th>
              <th>معالجة بواسطة</th>
              <th>الوقت</th>
            </tr>
          </thead>
          <tbody id="dailyListBody"></tbody>
        </table>
      </div>
      <p id="supervisorMessage" class="message" role="status"></p>

      <section class="print-report" aria-label="التقرير اليومي">
        <h2>تقرير وصفات البريد اليومي</h2>
        <p id="printReportDate" class="print-report-date"></p>
        <div class="print-summary">
          <div>
            <span>إجمالي القائمة</span>
            <strong id="printTotalCount">0</strong>
          </div>
          <div>
            <span>جاهزة للإرسال</span>
            <strong id="printPreparedCount">0</strong>
          </div>
        </div>
        <table class="print-user-table">
          <thead>
            <tr>
              <th>معالجة بواسطة</th>
              <th>العدد</th>
            </tr>
          </thead>
          <tbody id="printUserBody"></tbody>
        </table>
      </section>
    </section>
  </main>
</body>
</html>
