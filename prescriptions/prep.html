<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تحضير وصفات البريد</title>
  <link rel="stylesheet" href="style.css?v=20260612-login-actions">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
  <script src="script.js?v=20260612-login-pin" defer></script>
</head>
<body class="prep-body">
  <main class="app-shell employee-shell prep-shell">
    <header class="official-top">
      <img class="official-logo" src="logo.png" alt="Logo">
      <div class="official-header">
        <h2 id="officialLine1">تجمع المدينة المنورة الصحي</h2>
        <h3 id="officialLine2">مستشفى الملك فهد بالمدينة المنورة</h3>
        <h3 id="officialLine3">إدارة الرعاية الصيدلانية</h3>
      </div>
    </header>

    <hr class="official-divider">

    <div class="employee-meta">
      <div class="date-box" id="dateBox"></div>
      <button type="button" class="language-chip" id="languageToggle">🌐 ع | E</button>
    </div>

    <h1 class="employee-page-title" id="pageTitle">تحضير وصفات البريد</h1>

    <section id="loginView" class="view auth-view">
      <form id="loginForm" class="panel employee-login-card">
        <label id="usernameLabel" for="username">اسم المستخدم</label>
        <input id="username" name="username" autocomplete="username" required>

        <label id="pinLabel" for="pin">PIN</label>
        <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required>

        <div class="login-actions">
          <button id="loginBtn" class="primary-btn icon-action" type="submit" title="دخول" aria-label="دخول">↵</button>
          <button id="changePinLoginBtn" class="ghost-btn icon-action" type="button" title="تغيير PIN" aria-label="تغيير PIN">🔑</button>
        </div>
        <p id="loginMessage" class="message" role="status"></p>
      </form>
    </section>

    <section id="prepView" class="view prep-view hidden">
      <header class="topbar employee-toolbar">
        <div class="user-chip">
          <strong id="currentUser"></strong>
          <button id="logoutBtn" class="logout-icon" type="button" title="خروج" aria-label="خروج">⏻</button>
        </div>
      </header>

      <section class="scanner-area">
        <div id="reader"></div>
        <div class="scan-actions">
          <button id="startCameraBtn" class="camera-toggle icon-action" type="button" aria-pressed="false" title="إلتقاط" aria-label="إلتقاط">
            <span id="cameraButtonText" aria-hidden="true">📷</span>
          </button>
          <form id="manualForm" class="manual-form">
            <input id="manualFileNumber" inputmode="numeric" placeholder="MRN">
            <button id="manualSearchBtn" class="icon-action" type="submit" title="بحث" aria-label="بحث">⌕</button>
          </form>
        </div>
        <p id="scanMessage" class="message" role="status"></p>
      </section>

      <section id="resultCard" class="result-card hidden" aria-live="polite">
        <div>
          <span class="label" id="fileNumberLabel">رقم الملف</span>
          <strong id="fileNumberText"></strong>
        </div>
        <div>
          <span class="label" id="patientNameLabel">اسم المريض</span>
          <strong id="patientNameText"></strong>
        </div>
        <p id="preparedMessage" class="prepared-message hidden"></p>
        <button id="markPreparedBtn" class="done-btn icon-action" type="button" title="إرسال" aria-label="إرسال">✉</button>
      </section>
    </section>
    <a class="main-home-link" href="../home.html" title="العودة إلى القائمة الرئيسية" aria-label="العودة إلى القائمة الرئيسية">&#8962;</a>
  </main>
</body>
</html>
