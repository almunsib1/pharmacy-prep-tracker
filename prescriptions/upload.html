<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>إرسال قائمة وصفات البريد اليومية</title>
  <link rel="stylesheet" href="style.css?v=20260613-report-final-frame">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="upload.js?v=20260612-login-pin" defer></script>
</head>
<body class="upload-body">
  <main class="app-shell employee-shell upload-shell">
    <header class="official-top">
      <img class="official-logo" src="logo.png" alt="Logo">
      <div class="official-header">
        <h2 id="officialLine1">تجمع المدينة المنورة الصحي</h2>
        <h3 id="officialLine2">مستشفى الملك فهد بالمدينة المنورة</h3>
        <h3 id="officialLine3">إدارة الرعاية الصيدلانية</h3>
      </div>
    </header>

    <hr class="official-divider">

    <div class="employee-meta">
      <div class="date-box" id="dateBox"></div>
      <button type="button" class="language-chip" id="languageToggle">🌐 ع | E</button>
    </div>

    <h1 class="employee-page-title" id="pageTitle">إرسال قائمة وصفات البريد اليومية</h1>

    <section id="uploadLoginView" class="view auth-view">
      <form id="uploadLoginForm" class="panel employee-login-card">
        <label id="usernameLabel" for="username">اسم المستخدم</label>
        <input id="username" name="username" autocomplete="username" required>

        <label id="pinLabel" for="pin">PIN</label>
        <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required>

        <div class="login-actions">
          <button id="loginBtn" class="primary-btn icon-action" type="submit" title="دخول" aria-label="دخول"><svg class="login-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5"></path><path d="M15 12H3"></path><path d="M15 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"></path></svg></button>
          <button id="changePinLoginBtn" class="ghost-btn icon-action" type="button" title="تغيير PIN" aria-label="تغيير PIN">🔑</button>
        </div>
        <p id="loginMessage" class="message" role="status"></p>
      </form>
    </section>

    <section id="uploadView" class="view upload-page hidden">
      <header class="topbar employee-toolbar upload-toolbar">
        <div class="user-chip">
          <strong id="currentUser"></strong>
          <button id="logoutBtn" class="logout-icon" type="button" title="خروج" aria-label="خروج"><svg class="power-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v9"></path><path d="M7.1 6.8a8 8 0 1 0 9.8 0"></path></svg></button>
        </div>
      </header>

      <section class="upload-box upload-standalone">
        <p class="muted upload-intro" id="uploadIntro">ارفع ملف Excel أو CSV.</p>
        <form id="uploadForm">
          <label id="fileInputLabel" for="fileInput">ملف القائمة</label>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" required>

          <button class="done-btn upload-submit" id="uploadSubmitBtn" type="submit">إرسال قائمة</button>
        </form>
        <p class="hint warning-hint" id="uploadHint">سيتم حذف القائمة الحالية عند رفع قائمة جديدة.</p>
        <p id="uploadMessage" class="message" role="status"></p>
      </section>
    </section>
    <a class="main-home-link" href="../home.html" title="العودة إلى القائمة الرئيسية" aria-label="العودة إلى القائمة الرئيسية">&#8962;</a>
  </main>
</body>
</html>
