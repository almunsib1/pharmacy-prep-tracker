<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medication Pickup Service Dashboard</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f3f4f6;margin:0;padding:16px;color:#168fb3}
.container{max-width:1100px;margin:auto;background:#fff;padding:22px;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,.1)}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;direction:rtl}
.logo{width:120px;height:120px;object-fit:contain}
.official-header{width:fit-content;max-width:100%;text-align:start;margin-inline-start:0;margin-inline-end:auto;transform:translateY(14px)}
.official-header h2,.official-header h3{margin:2px 0;font-size:13px;line-height:1.4;color:#168fb3}
[dir="rtl"] .official-header{padding-left:8px;border-left:4px solid #168fb3}
[dir="ltr"] .official-header{padding-right:8px;border-right:4px solid #168fb3}
hr{border:none;border-top:1px solid #e5e7eb;margin:14px 0}
.page-title{text-align:center;font-size:24px;font-weight:bold;margin:14px 0 10px;color:#168fb3}
.subtitle{text-align:center;color:#168fb3;margin-bottom:18px;line-height:1.7}
.meta-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;direction:ltr}
.date-box{color:#168fb3;padding:6px 10px;font-size:13px;font-weight:bold;text-align:center}
.language-btn{border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:bold;color:#168fb3;padding:4px 0;border-radius:0}
.language-btn:hover{background:transparent}
.cards{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:20px}
.card{background:#168fb3;color:#fff;padding:14px 10px;border-radius:8px;text-align:center;min-width:0}
.card h2{margin:0;font-size:18px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card p{margin:7px 0 0;font-size:12px;line-height:1.35}
.insight{background:#f9fafb;color:#168fb3;border:1px solid #e5e7eb}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;margin-top:15px;min-width:620px}
th,td{padding:12px;border:1px solid #e5e7eb;text-align:center;color:#111827}
th{background:#168fb3;color:#fff}
.loading{text-align:center;font-size:20px;padding:30px;color:#168fb3}
.main-home-link{display:flex;align-items:center;justify-content:center;width:fit-content;margin:20px auto 0;color:#168fb3;text-decoration:none;font-size:28px;line-height:1;background:transparent;border:none;padding:4px}
.main-home-link:hover{color:#0f7592}
@media (max-width:600px){
body{padding:10px;background:#fff}
.container{padding:14px;border-radius:0;box-shadow:none}
.logo{width:84px;height:84px}
.official-header{transform:translateY(10px)}
.official-header h2,.official-header h3{font-size:12px}
.page-title{font-size:20px}
.date-box,.language-btn{font-size:12px;padding:6px 9px}
.cards{grid-template-columns:repeat(2,minmax(0,1fr))}
.card h2{font-size:18px}
}
</style>
</head>

<body>
<div class="container">
<div class="top-bar">
  <div class="official-header">
    <h2 id="officialLine1"></h2>
    <h3 id="officialLine2"></h3>
    <h3 id="officialLine3"></h3>
  </div>
  <img class="logo" src="logo.png" alt="Logo">
</div>

<hr>

<div class="meta-row">
  <div class="date-box" id="dateBox"></div>
  <button type="button" class="language-btn" id="languageToggle" onclick="toggleLanguage()"></button>
</div>

<div class="page-title" id="pageTitle"></div>
<p class="subtitle" id="pageSubtitle"></p>

<div id="loading" class="loading">Loading dashboard...</div>

<div id="dashboard" style="display:none">
<div class="cards">
<div class="card">
<h2 id="totalBookings">0</h2>
<p id="totalBookingsLabel">Total Bookings Today</p>
</div>

<div class="card">
<h2 id="remainingToday">0</h2>
<p id="remainingTodayLabel">Remaining Capacity</p>
</div>

<div class="card">
<h2 id="occupancyRate">0%</h2>
<p id="occupancyRateLabel">Occupancy Rate</p>
</div>

<div class="card insight">
<h2 id="statusText">Low</h2>
<p id="statusLabel">Daily Status</p>
</div>

<div class="card insight">
<h2 id="busiestSlot">-</h2>
<p id="busiestSlotLabel">Busiest Slot</p>
</div>

<div class="card insight">
<h2 id="leastBusySlot">-</h2>
<p id="leastBusySlotLabel">Least Busy Slot</p>
</div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th id="timeHeader">Time Slot</th>
<th id="bookedHeader">Booked</th>
<th id="remainingHeader">Remaining</th>
<th id="slotOccupancyHeader">Occupancy</th>
</tr>
</thead>
<tbody id="slotsTable"></tbody>
</table>
</div>
</div>
<a class="main-home-link" href="../home.html" title="العودة إلى القائمة الرئيسية" aria-label="العودة إلى القائمة الرئيسية">&#8962;</a>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw9JM87uiSHihWDP0N1gn4IskEG_8O-fWleathLZW9Wwbs915UQz8Gq5k2dIwAGImCF/exec?action=dashboard";

let currentLang = "en";
let dashboardData = null;

const text = {
  en: {
    officialLine1: "Madinah Health Cluster",
    officialLine2: "King Fahad Hospital - Madinah",
    officialLine3: "Pharmaceutical Care Administration",
    pageTitle: "Medication Pickup Service Dashboard",
    pageSubtitle: "Medication Refill Pickup Appointment Service",
    loading: "Loading dashboard...",
    failed: "Failed to load dashboard data",
    todayLabel: "Today",
    totalBookings: "Total Bookings Today",
    remainingToday: "Remaining Capacity",
    occupancyRate: "Occupancy Rate",
    dailyStatus: "Daily Status",
    busiestSlot: "Busiest Slot",
    leastBusySlot: "Least Busy Slot",
    timeSlot: "Time Slot",
    booked: "Booked",
    remaining: "Remaining",
    occupancy: "Occupancy",
    low: "Low",
    medium: "Medium",
    high: "High"
  },
  ar: {
    officialLine1: "تجمع المدينة المنورة الصحي",
    officialLine2: "مستشفى الملك فهد بالمدينة المنورة",
    officialLine3: "إدارة الرعاية الصيدلانية",
    pageTitle: "مؤشرات خدمة استلام الأدوية",
    pageSubtitle: "خدمة حجز موعد استلام أدوية إعادة الصرف",
    loading: "جاري تحميل البيانات...",
    failed: "فشل تحميل بيانات المؤشرات",
    todayLabel: "اليوم",
    totalBookings: "إجمالي حجوزات اليوم",
    remainingToday: "المقاعد المتبقية",
    occupancyRate: "نسبة الإشغال",
    dailyStatus: "حالة اليوم",
    busiestSlot: "أكثر فترة ازدحاما",
    leastBusySlot: "أقل فترة ازدحاما",
    timeSlot: "الفترة",
    booked: "المحجوز",
    remaining: "المتبقي",
    occupancy: "نسبة الإشغال",
    low: "منخفض",
    medium: "متوسط",
    high: "مرتفع"
  }
};

function setLanguage(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
  document.getElementById("officialLine1").innerText = text[lang].officialLine1;
  document.getElementById("officialLine2").innerText = text[lang].officialLine2;
  document.getElementById("officialLine3").innerText = text[lang].officialLine3;
  document.getElementById("pageTitle").innerText = text[lang].pageTitle;
  document.getElementById("pageSubtitle").innerText = text[lang].pageSubtitle;
  document.getElementById("totalBookingsLabel").innerText = text[lang].totalBookings;
  document.getElementById("remainingTodayLabel").innerText = text[lang].remainingToday;
  document.getElementById("occupancyRateLabel").innerText = text[lang].occupancyRate;
  document.getElementById("statusLabel").innerText = text[lang].dailyStatus;
  document.getElementById("busiestSlotLabel").innerText = text[lang].busiestSlot;
  document.getElementById("leastBusySlotLabel").innerText = text[lang].leastBusySlot;
  document.getElementById("timeHeader").innerText = text[lang].timeSlot;
  document.getElementById("bookedHeader").innerText = text[lang].booked;
  document.getElementById("remainingHeader").innerText = text[lang].remaining;
  document.getElementById("slotOccupancyHeader").innerText = text[lang].occupancy;
  document.getElementById("languageToggle").innerText = "🌐 ع | E";

  if (dashboardData) {
    renderDashboard();
  } else {
    document.getElementById("loading").innerText = text[lang].loading;
  }
}

function toggleLanguage() {
  setLanguage(currentLang === "ar" ? "en" : "ar");
}

function statusLabel(status) {
  if (status === "HIGH") return text[currentLang].high;
  if (status === "MEDIUM") return text[currentLang].medium;
  return text[currentLang].low;
}

async function loadDashboard() {
  try {
    const response = await fetch(API_URL);
    const data = await response.json();

    if (!data.success || !data.dashboard) {
      throw new Error("Invalid dashboard response");
    }

    dashboardData = data.dashboard;
    document.getElementById("loading").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    renderDashboard();
  } catch (error) {
    document.getElementById("loading").innerText = text[currentLang].failed;
  }
}

function renderDashboard() {
  const d = dashboardData;
  const busiestSlot = d.busiestSlot || { time: "-", booked: 0 };
  const leastBusySlot = d.leastBusySlot || { time: "-", booked: 0 };

  document.getElementById("dateBox").innerText = `${getDisplayDayName(d)} - ${d.date}`;
  document.getElementById("totalBookings").innerText = d.totalBookings;
  document.getElementById("remainingToday").innerText = d.remainingToday;
  document.getElementById("occupancyRate").innerText = `${d.occupancyRate}%`;
  document.getElementById("statusText").innerText = statusLabel(d.status);
  document.getElementById("busiestSlot").innerText = `${busiestSlot.time} (${busiestSlot.booked})`;
  document.getElementById("leastBusySlot").innerText = `${leastBusySlot.time} (${leastBusySlot.booked})`;

  document.getElementById("slotsTable").innerHTML = d.slots.map(slot => `
    <tr>
      <td>${slot.time}</td>
      <td>${slot.booked}</td>
      <td>${slot.remaining}</td>
      <td>${slot.occupancy}%</td>
    </tr>
  `).join("");
}

function getDisplayDayName(data) {
  const apiDayName = currentLang === "ar" ? data.dayNameAr : data.dayNameEn;

  if (apiDayName) {
    return apiDayName;
  }

  const dayNames = currentLang === "ar"
    ? ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"]
    : ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const parsedDate = new Date(`${data.date}T12:00:00`);

  return dayNames[parsedDate.getDay()];
}

setLanguage("en");
loadDashboard();
</script>
</body>
</html>
