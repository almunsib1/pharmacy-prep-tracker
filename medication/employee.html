<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة الموظف - Medication Pickup Service</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f3f4f6;margin:0;padding:16px;color:#168fb3}
.container{max-width:1100px;margin:auto;background:#fff;padding:22px;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,.1)}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;direction:rtl}
.logo{width:120px;height:120px;object-fit:contain}
.official-header{width:fit-content;max-width:100%;text-align:start;margin-inline-start:0;margin-inline-end:auto;transform:translateY(14px)}
.official-header h2,.official-header h3{margin:2px 0;font-size:13px;line-height:1.4;color:#168fb3}
[dir="rtl"] .official-header{padding-left:8px;border-left:4px solid #168fb3}
[dir="ltr"] .official-header{padding-right:8px;border-right:4px solid #168fb3}
hr{border:none;border-top:1px solid #e5e7eb;margin:14px 0}
.page-title{text-align:center;font-size:24px;font-weight:bold;margin:14px 0 10px;color:#168fb3}
.meta-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;direction:ltr}
.date-box{color:#168fb3;padding:6px 10px;font-size:13px;font-weight:bold;text-align:center}
.language-btn{border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:bold;color:#168fb3;padding:4px 0;border-radius:0}
.secondary-btn,.action-btn{border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:13px;font-weight:bold;color:#168fb3;padding:7px 10px;border-radius:8px}
.language-btn:hover{background:transparent}
.secondary-btn:hover{background:#f9fafb}
.login-card,.toolbar,.empty-box{border:1px solid #e5e7eb;background:#f9fafb;border-radius:8px;padding:14px;margin-top:14px}
.login-card{max-width:280px;margin:16px auto 0;background:#f9fafb;box-shadow:none;padding:12px}
.change-password-panel{display:none;border-top:1px solid #e5e7eb;margin-top:14px;padding-top:14px}
label{font-weight:bold;display:block;margin-bottom:3px;font-size:13px}
input,select{width:100%;height:36px;padding:7px 10px;margin-top:5px;margin-bottom:10px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;background:#fff;text-align:start}
.primary-btn{padding:9px 18px;background:#168fb3;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer}
.login-card .primary-btn{display:table;margin:4px auto 0;width:auto}
.login-actions{display:flex;align-items:center;justify-content:center;gap:8px;width:fit-content;margin:2px auto 0}
.login-actions .primary-btn,.login-actions .secondary-btn{width:36px;height:36px;margin:0;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:18px;line-height:1;text-align:center;vertical-align:middle}
.login-actions .secondary-btn{font-size:17px;padding-top:1px}
.primary-btn:disabled,.action-btn:disabled{background:#94a3b8;color:#fff;cursor:not-allowed}
.toolbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.toolbar > div{min-width:0}
.pharmacy-tools{flex:0 0 auto}
.pharmacy-tools select{width:auto;min-width:230px;height:38px;margin-bottom:0;font-size:14px}
.employee-name{font-weight:bold;color:#168fb3}
.employee-tools{flex:0 0 auto;display:flex;align-items:center;justify-content:flex-end;gap:8px;text-align:end;min-height:38px}
.employee-line{display:flex;align-items:center;justify-content:flex-end;gap:6px;min-height:38px}
.logout-icon{width:28px;height:28px;padding:0;border:none;background:transparent;color:#168fb3;font-size:22px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.logout-icon:hover{background:transparent;transform:scale(1.08)}
.table-wrap{overflow-x:auto;margin-top:16px}
table{width:100%;border-collapse:collapse;min-width:980px}
th,td{padding:8px;border:1px solid #e5e7eb;text-align:center;color:#111827;font-size:13px}
th{background:#168fb3;color:#fff}
.status{display:inline-block;padding:5px 9px;border-radius:8px;font-weight:bold;font-size:13px}
.status-booked{background:#eff6ff;color:#1d4ed8}
.status-received{background:#fff7ed;color:#9a3412}
.status-delivered{background:#ecfdf5;color:#047857}
.row-actions{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:nowrap}
.icon-btn{width:28px;height:28px;padding:0;border:none;background:transparent;border-radius:0;display:inline-flex;align-items:center;justify-content:center;font-size:20px;line-height:1}
.icon-btn:hover{background:transparent;transform:scale(1.08)}
.icon-btn:disabled{background:transparent;color:#9ca3af;border:none;cursor:not-allowed;filter:grayscale(1);opacity:.55;transform:none}
.print-btn{background:transparent;color:#168fb3;border:none}
.receive-btn{background:transparent;color:#168fb3;border:none}
.deliver-btn{background:transparent;color:#0f766e;border:none}
.deliver-btn.delivered-complete{background:transparent;color:#9ca3af;border:none}
#result{display:none;margin-top:14px;padding:12px;border-radius:8px;text-align:center}
#result.error{display:block;background:#fef2f2;color:#991b1b}
#result.success{display:block;background:#ecfdf5;color:#065f46}
#loginResult{display:none;margin-top:12px;padding:10px;border-radius:8px;text-align:center}
#loginResult.error{display:block;background:#fef2f2;color:#991b1b}
#loginResult.success{display:block;background:#ecfdf5;color:#065f46}
.print-label{display:none}
.main-home-link{display:flex;align-items:center;justify-content:center;width:fit-content;margin:20px auto 0;color:#168fb3;text-decoration:none;font-size:28px;line-height:1;background:transparent;border:none;padding:4px}
.main-home-link:hover{color:#0f7592}
@media print{
  body *{visibility:hidden}
  .print-label,.print-label *{visibility:visible}
  .print-label{display:block;position:absolute;left:0;top:0;width:58mm;padding:6mm;text-align:center;color:#000;font-family:Arial,sans-serif}
  .print-label .print-booking{font-size:24px;font-weight:bold;margin-bottom:8px}
  .print-label .print-name{font-size:16px;margin-bottom:8px}
  .print-label .print-employee{font-size:13px}
}
@media (max-width:600px){
body{padding:10px;background:#fff}
.container{padding:14px;border-radius:0;box-shadow:none}
.logo{width:84px;height:84px}
.official-header{transform:translateY(10px)}
.official-header h2,.official-header h3{font-size:12px}
.page-title{font-size:20px}
.date-box,.language-btn{font-size:12px;padding:6px 9px}
.toolbar{display:block}
.pharmacy-tools select{width:100%;min-width:0}
.employee-tools{margin-top:8px;align-items:center;justify-content:center;text-align:center}
.employee-line{justify-content:center;min-height:auto}
.primary-btn,.secondary-btn{width:100%;margin-top:6px}
.logout-icon{width:28px}
.login-card{max-width:280px;padding:12px}
.login-card .primary-btn{width:auto}
}
</style>
</head>

<body>
<div class="container">
<div class="top-bar">
  <div class="official-header">
    <h2 id="officialLine1"></h2>
    <h3 id="officialLine2"></h3>
    <h3 id="officialLine3"></h3>
  </div>
  <img class="logo" src="logo.png" alt="Logo">
</div>

<hr>

<div class="meta-row">
  <div class="date-box" id="dateBox"></div>
  <button type="button" class="language-btn" id="languageToggle" onclick="toggleLanguage()"></button>
</div>

<div class="page-title" id="pageTitle"></div>

<div id="loginView" class="login-card">
  <label id="usernameLabel" for="username"></label>
  <input type="text" id="username" autocomplete="username">
  <label id="passwordLabel" for="password"></label>
  <input type="password" id="password" inputmode="numeric" autocomplete="current-password">
  <div class="login-actions">
    <button type="button" class="primary-btn" id="loginBtn" onclick="loginEmployee()"></button>
    <button type="button" class="secondary-btn" id="togglePasswordBtn" onclick="togglePasswordPanel()"></button>
  </div>
  <div class="change-password-panel" id="changePasswordPanel">
    <label id="changeUsernameLabel" for="changeUsername"></label>
    <input type="text" id="changeUsername" autocomplete="username">
    <label id="oldPasswordLabel" for="oldPassword"></label>
    <input type="password" id="oldPassword" autocomplete="current-password">
    <label id="newPasswordLabel" for="newPassword"></label>
    <input type="password" id="newPassword" autocomplete="new-password">
    <button type="button" class="primary-btn" id="changePasswordBtn" onclick="changePassword()"></button>
  </div>
  <div id="loginResult"></div>
</div>

<div id="employeeView" style="display:none">
  <div class="toolbar">
    <div class="pharmacy-tools">
      <label id="pharmacyFilterLabel" for="pharmacyFilter"></label>
      <select id="pharmacyFilter" onchange="loadBookings()"></select>
    </div>
    <div class="employee-tools">
      <div class="employee-line">
        <span class="employee-name" id="employeeName"></span>
      </div>
      <button type="button" class="logout-icon" id="logoutBtn" onclick="logoutEmployee()"></button>
    </div>
  </div>

  <div id="result"></div>
  <div id="emptyBox" class="empty-box" style="display:none"></div>

  <div class="table-wrap">
    <table id="bookingsTable" style="display:none">
      <thead>
        <tr>
          <th id="bookingIdHeader"></th>
          <th id="patientHeader"></th>
          <th id="fileHeader"></th>
          <th id="mobileHeader"></th>
          <th id="pharmacyHeader"></th>
          <th id="timeHeader"></th>
          <th id="statusHeader"></th>
          <th id="actionsHeader"></th>
        </tr>
      </thead>
      <tbody id="bookingsBody"></tbody>
    </table>
  </div>
</div>
<a class="main-home-link" href="../home.html" title="العودة إلى القائمة الرئيسية" aria-label="العودة إلى القائمة الرئيسية">&#8962;</a>

<div class="print-label" id="printLabel">
  <div class="print-booking" id="printBookingId"></div>
  <div class="print-name" id="printPatientName"></div>
  <div class="print-employee" id="printEmployeeName"></div>
</div>
</div>

<script>
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbw9JM87uiSHihWDP0N1gn4IskEG_8O-fWleathLZW9Wwbs915UQz8Gq5k2dIwAGImCF/exec";

let currentLang = "ar";
let currentEmployee = sessionStorage.getItem("employeeName") || "";
let currentUsername = sessionStorage.getItem("employeeUsername") || "";
let bookings = [];
let refreshTimer = null;
let employeeInactivityTimer = null;
const EMPLOYEE_INACTIVITY_LIMIT_MS = 30 * 60 * 1000;

const PHARMACIES = [
  { value: "", ar: "جميع الصيدليات", en: "All Pharmacies" },
  { value: "Outpatient Pharmacy", ar: "صيدلية العيادات الخارجية", en: "Outpatient Pharmacy" },
  { value: "Diabetes Center Pharmacy", ar: "صيدلية مركز السكر", en: "Diabetes Center Pharmacy" }
];

const text = {
  ar: {
    officialLine1: "تجمع المدينة المنورة الصحي",
    officialLine2: "مستشفى الملك فهد بالمدينة المنورة",
    officialLine3: "إدارة الرعاية الصيدلانية",
    pageTitle: "إدارة مواعيد صرف الأدوية الشهرية",
    today: "اليوم",
    username: "اسم المستخدم",
    password: "PIN",
    login: "تسجيل الدخول",
    changePassword: "تغيير PIN",
    oldPassword: "PIN الحالي",
    newPassword: "PIN الجديد",
    passwordChanged: "تم تغيير PIN بنجاح.",
    passwordMismatch: "اسم المستخدم أو PIN الحالي غير صحيح.",
    passwordTooShort: "PIN الجديد يجب ألا يكون فارغا.",
    logout: "تسجيل الخروج",
    invalidLogin: "ليس لديك صلاحيات المستخدم الرئيسي.",
    loggedInAs: "الموظف:",
    pharmacyFilter: "اختر الصيدلية",
    bookingId: "رقم الحجز",
    patient: "اسم المريض",
    file: "رقم الملف",
    mobile: "رقم الجوال",
    pharmacy: "الصيدلية",
    pickupTime: "وقت الاستلام",
    status: "حالة الطلب",
    actions: "الإجراءات",
    print: "🖨️ طباعة الملصق",
    receive: "تم استلام الطلب",
    deliver: "تم تسليم الطلب",
    booked: "Booked",
    received: "Received",
    delivered: "Delivered",
    noBookings: "لا توجد حجوزات لهذا اليوم.",
    updated: "تم تحديث حالة الطلب.",
    updateFailed: "تعذر تحديث حالة الطلب.",
    loading: "جاري تحميل الحجوزات...",
    employeeLabel: "الموظف"
  },
  en: {
    officialLine1: "Madinah Health Cluster",
    officialLine2: "King Fahad Hospital - Madinah",
    officialLine3: "Pharmaceutical Care Administration",
    pageTitle: "Monthly Medication Appointment Management",
    today: "Today",
    username: "Username",
    password: "PIN",
    login: "Login",
    changePassword: "Change PIN",
    oldPassword: "Current PIN",
    newPassword: "New PIN",
    passwordChanged: "PIN changed successfully.",
    passwordMismatch: "Username or current PIN is incorrect.",
    passwordTooShort: "New PIN cannot be empty.",
    logout: "Logout",
    invalidLogin: "You do not have main admin permissions.",
    loggedInAs: "Employee:",
    pharmacyFilter: "Select Pharmacy",
    bookingId: "Booking ID",
    patient: "Patient Name",
    file: "File Number",
    mobile: "Mobile Number",
    pharmacy: "Pharmacy",
    pickupTime: "Pickup Time",
    status: "Status",
    actions: "Actions",
    print: "🖨️ Print Label",
    receive: "Mark Received",
    deliver: "Mark Delivered",
    booked: "Booked",
    received: "Received",
    delivered: "Delivered",
    noBookings: "No bookings for today.",
    updated: "Order status updated.",
    updateFailed: "Unable to update order status.",
    loading: "Loading bookings...",
    employeeLabel: "Employee"
  }
};

function setLanguage(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
  document.getElementById("officialLine1").innerText = text[lang].officialLine1;
  document.getElementById("officialLine2").innerText = text[lang].officialLine2;
  document.getElementById("officialLine3").innerText = text[lang].officialLine3;
  document.getElementById("pageTitle").innerText = text[lang].pageTitle;
  document.getElementById("usernameLabel").innerText = text[lang].username;
  document.getElementById("passwordLabel").innerText = text[lang].password;
  document.getElementById("loginBtn").innerText = "↵";
  document.getElementById("loginBtn").title = text[lang].login;
  document.getElementById("loginBtn").setAttribute("aria-label", text[lang].login);
  document.getElementById("togglePasswordBtn").innerText = "🔑";
  document.getElementById("togglePasswordBtn").title = text[lang].changePassword;
  document.getElementById("togglePasswordBtn").setAttribute("aria-label", text[lang].changePassword);
  document.getElementById("changeUsernameLabel").innerText = text[lang].username;
  document.getElementById("oldPasswordLabel").innerText = text[lang].oldPassword;
  document.getElementById("newPasswordLabel").innerText = text[lang].newPassword;
  document.getElementById("changePasswordBtn").innerText = text[lang].changePassword;
  document.getElementById("logoutBtn").innerText = "⏻";
  document.getElementById("logoutBtn").title = text[lang].logout;
  document.getElementById("logoutBtn").setAttribute("aria-label", text[lang].logout);
  document.getElementById("pharmacyFilterLabel").innerText = text[lang].pharmacyFilter;
  document.getElementById("bookingIdHeader").innerText = text[lang].bookingId;
  document.getElementById("patientHeader").innerText = text[lang].patient;
  document.getElementById("fileHeader").innerText = text[lang].file;
  document.getElementById("mobileHeader").innerText = text[lang].mobile;
  document.getElementById("pharmacyHeader").innerText = text[lang].pharmacy;
  document.getElementById("timeHeader").innerText = text[lang].pickupTime;
  document.getElementById("statusHeader").innerText = text[lang].status;
  document.getElementById("actionsHeader").innerText = text[lang].actions;
  document.getElementById("languageToggle").innerText = "🌐 ع | E";
  renderDate();
  renderPharmacyFilter();
  renderBookings();
}

function toggleLanguage() {
  setLanguage(currentLang === "ar" ? "en" : "ar");
}

function renderDate() {
  const now = new Date();
  const date = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Riyadh" }).format(now);
  const dayName = new Intl.DateTimeFormat(currentLang === "ar" ? "ar-SA" : "en-US", {
    timeZone: "Asia/Riyadh",
    weekday: "long"
  }).format(now);

  document.getElementById("dateBox").innerText = `${dayName} - ${date}`;
}

function renderPharmacyFilter() {
  const select = document.getElementById("pharmacyFilter");
  const selected = select.value;
  select.innerHTML = "";
  PHARMACIES.forEach(pharmacy => {
    const option = document.createElement("option");
    option.value = pharmacy.value;
    option.textContent = pharmacy[currentLang];
    select.appendChild(option);
  });
  select.value = selected || "";
}

async function loginEmployee() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  try {
    const response = await fetch(API_BASE_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "employeeLogin",
        username,
        password
      })
    });
    const result = await response.json();

    if (!result.success || !result.employee) {
      showLoginResult("error", text[currentLang].invalidLogin);
      return;
    }

    currentEmployee = result.employee.name;
    currentUsername = result.employee.username;
    sessionStorage.setItem("employeeName", currentEmployee);
    sessionStorage.setItem("employeeUsername", currentUsername);
    showEmployeeView();
  } catch (error) {
    showLoginResult("error", text[currentLang].invalidLogin);
  }
}

function togglePasswordPanel() {
  const panel = document.getElementById("changePasswordPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
  clearLoginResult();
}

async function changePassword() {
  const username = document.getElementById("changeUsername").value.trim();
  const oldPassword = document.getElementById("oldPassword").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();

  if (!newPassword) {
    showLoginResult("error", text[currentLang].passwordTooShort);
    return;
  }

  try {
    const response = await fetch(API_BASE_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "changeEmployeePassword",
        username,
        oldPassword,
        newPassword
      })
    });
    const result = await response.json();

    if (!result.success) {
      showLoginResult("error", text[currentLang].passwordMismatch);
      return;
    }

    document.getElementById("oldPassword").value = "";
    document.getElementById("newPassword").value = "";
    showLoginResult("success", text[currentLang].passwordChanged);
  } catch (error) {
    showLoginResult("error", text[currentLang].passwordMismatch);
  }
}

function logoutEmployee() {
  sessionStorage.removeItem("employeeName");
  sessionStorage.removeItem("employeeUsername");
  currentEmployee = "";
  currentUsername = "";
  stopAutoRefresh();
  stopEmployeeInactivityWatcher();
  document.getElementById("employeeView").style.display = "none";
  document.getElementById("loginView").style.display = "block";
}

function showEmployeeView() {
  document.getElementById("loginView").style.display = "none";
  document.getElementById("employeeView").style.display = "block";
  document.getElementById("employeeName").innerText = currentEmployee;
  loadBookings();
  startAutoRefresh();
  startEmployeeInactivityWatcher();
}

function startEmployeeInactivityWatcher() {
  ["click", "keydown", "touchstart", "mousemove"].forEach(function(eventName) {
    window.addEventListener(eventName, resetEmployeeInactivityTimer, { passive: true });
  });
  resetEmployeeInactivityTimer();
}

function stopEmployeeInactivityWatcher() {
  window.clearTimeout(employeeInactivityTimer);
}

function resetEmployeeInactivityTimer() {
  window.clearTimeout(employeeInactivityTimer);
  employeeInactivityTimer = window.setTimeout(function() {
    if (sessionStorage.getItem("employeeUsername")) logoutEmployee();
  }, EMPLOYEE_INACTIVITY_LIMIT_MS);
}

function startAutoRefresh() {
  stopAutoRefresh();
  refreshTimer = setInterval(function() {
    if (currentEmployee) {
      loadBookings(true);
    }
  }, 10000);
}

function stopAutoRefresh() {
  if (refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
}

function showResult(type, message) {
  const result = document.getElementById("result");
  result.className = type;
  result.innerText = message;
}

function showLoginResult(type, message) {
  const result = document.getElementById("loginResult");
  result.className = type;
  result.innerText = message;
}

function clearLoginResult() {
  const result = document.getElementById("loginResult");
  result.className = "";
  result.innerText = "";
}

function clearResult() {
  const result = document.getElementById("result");
  result.className = "";
  result.innerText = "";
}

async function loadBookings(isSilent) {
  if (!currentEmployee) return;
  clearResult();
  if (!isSilent) {
    document.getElementById("emptyBox").style.display = "block";
    document.getElementById("emptyBox").innerText = text[currentLang].loading;
    document.getElementById("bookingsTable").style.display = "none";
  }

  const pharmacy = document.getElementById("pharmacyFilter").value;
  const url = `${API_BASE_URL}?action=employeeBookings&pharmacy=${encodeURIComponent(pharmacy)}`;

  try {
    const response = await fetch(url);
    const data = await response.json();
    bookings = data.success ? data.bookings : [];
    renderBookings();
  } catch (error) {
    bookings = [];
    showResult("error", text[currentLang].updateFailed);
    renderBookings();
  }
}

function renderBookings() {
  const body = document.getElementById("bookingsBody");
  const table = document.getElementById("bookingsTable");
  const empty = document.getElementById("emptyBox");

  if (!body) return;

  body.innerHTML = "";

  if (!bookings.length) {
    table.style.display = "none";
    empty.style.display = "block";
    empty.innerText = text[currentLang].noBookings;
    return;
  }

  empty.style.display = "none";
  table.style.display = "table";

  bookings.forEach(booking => {
    const status = normalizeClientStatus(booking.status);
    const receiveDisabled = status === "Received" || status === "Delivered";
    const deliverDisabled = status === "Delivered";
    const deliverClass = status === "Delivered" ? " delivered-complete" : "";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${booking.bookingId}</td>
      <td>${booking.fullName}</td>
      <td>${booking.fileNumber}</td>
      <td>${booking.mobileNumber || ""}</td>
      <td>${getPharmacyName(booking.pharmacy)}</td>
      <td>${booking.pickupTime}</td>
      <td>${statusBadge(status)}</td>
      <td>
        <div class="row-actions">
          <button type="button" class="action-btn icon-btn print-btn" title="${text[currentLang].print}" aria-label="${text[currentLang].print}" onclick="printLabel('${booking.bookingId}')">🖨️</button>
          <button type="button" class="action-btn icon-btn receive-btn" title="${text[currentLang].receive}" aria-label="${text[currentLang].receive}" ${receiveDisabled ? "disabled" : ""} onclick="updateStatus('${booking.bookingId}','markReceived')">📦</button>
          <button type="button" class="action-btn icon-btn deliver-btn${deliverClass}" title="${text[currentLang].deliver}" aria-label="${text[currentLang].deliver}" ${deliverDisabled ? "disabled" : ""} onclick="updateStatus('${booking.bookingId}','markDelivered')">✅</button>
        </div>
      </td>
    `;
    body.appendChild(tr);
  });
}

function normalizeClientStatus(status) {
  if (!status || status === "Confirmed") {
    return "Booked";
  }

  return status;
}

function statusBadge(status) {
  const normalized = status || "Booked";
  const labelMap = { Booked: text[currentLang].booked, Received: text[currentLang].received, Delivered: text[currentLang].delivered };
  const classMap = { Booked: "status-booked", Received: "status-received", Delivered: "status-delivered" };
  return `<span class="status ${classMap[normalized] || "status-booked"}">${labelMap[normalized] || normalized}</span>`;
}

function getPharmacyName(value) {
  const pharmacy = PHARMACIES.find(item => item.value === value);
  return pharmacy ? pharmacy[currentLang] : value;
}

function printLabel(bookingId) {
  const booking = bookings.find(item => item.bookingId === bookingId);
  if (!booking) return;
  document.getElementById("printBookingId").innerText = booking.bookingId;
  document.getElementById("printPatientName").innerText = booking.fullName;
  document.getElementById("printEmployeeName").innerText = `${text[currentLang].employeeLabel}: ${currentUsername || currentEmployee}`;
  window.print();
}

async function updateStatus(bookingId, action) {
  clearResult();
  const booking = bookings.find(item => item.bookingId === bookingId);

  try {
    const response = await fetch(API_BASE_URL, {
      method: "POST",
      body: JSON.stringify({
        action,
        bookingId,
        pickupDate: booking ? booking.pickupDate : "",
        pickupTime: booking ? booking.pickupTime : "",
        pharmacy: booking ? booking.pharmacy : "",
        employeeUsername: currentUsername,
        employeeName: currentEmployee
      })
    });
    const data = await response.json();

    if (!data.success) {
      showResult("error", formatUpdateError(data));
      return;
    }

    if (booking) {
      booking.status = action === "markReceived" ? "Received" : "Delivered";
    }

    showResult("success", text[currentLang].updated);
    renderBookings();
    await loadBookings();
  } catch (error) {
    showResult("error", text[currentLang].updateFailed);
  }
}

function formatUpdateError(data) {
  const reason = data && (data.code || data.message) ? (data.code || data.message) : "";

  if (!reason) {
    return text[currentLang].updateFailed;
  }

  return `${text[currentLang].updateFailed} (${reason})`;
}

setLanguage("ar");
if (currentEmployee) {
  showEmployeeView();
}
</script>
</body>
</html>
