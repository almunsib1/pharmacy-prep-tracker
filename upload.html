<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>رفع قائمة وصفات اليوم</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="upload.js" defer></script>
</head>
<body>
  <main class="app-shell employee-shell">
    <header class="official-top">
      <div class="official-header">
        <h2>تجمع المدينة المنورة الصحي</h2>
        <h3>مستشفى الملك فهد بالمدينة المنورة</h3>
        <h3>إدارة الرعاية الصيدلانية</h3>
      </div>
      <img class="official-logo" src="logo.png" alt="Logo">
    </header>

    <hr class="official-divider">

    <div class="employee-meta">
      <div class="date-box" id="dateBox"></div>
    </div>

    <h1 class="employee-page-title">إرسال قائمة وصفات البريد اليومية</h1>

    <section id="uploadLoginView" class="view auth-view">
      <form id="uploadLoginForm" class="panel employee-login-card">
        <label for="username">اسم المستخدم</label>
        <input id="username" name="username" autocomplete="username" required>

        <label for="pin">PIN</label>
        <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required>

        <button class="primary-btn icon-action" type="submit" title="دخول" aria-label="دخول">↵</button>
        <p id="loginMessage" class="message" role="status"></p>
      </form>
    </section>

    <section id="uploadView" class="view upload-page hidden">
      <header class="topbar employee-toolbar upload-toolbar">
        <div class="user-chip">
          <strong id="currentUser"></strong>
          <button id="logoutBtn" class="logout-icon" type="button" title="خروج" aria-label="خروج">↪</button>
        </div>
      </header>

      <section class="upload-box upload-standalone">
        <p class="muted upload-intro">ارفع ملف Excel أو CSV.</p>
        <form id="uploadForm">
          <label for="fileInput">ملف القائمة</label>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" required>

          <button class="done-btn upload-submit" type="submit">إرسال قائمة</button>
        </form>
        <p class="hint warning-hint">سيتم حذف القائمة الحالية عند رفع قائمة جديدة.</p>
        <p id="uploadMessage" class="message" role="status"></p>
      </section>
    </section>
  </main>
</body>
</html>
